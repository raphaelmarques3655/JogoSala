<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Polícia e Ladrão - Login</title>
  <style>
    body {
      margin: 0; padding: 0; background: linear-gradient(#0a1a0f, #112233);
      font-family: Arial, sans-serif; color: white; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .container {
      background: rgba(0,0,0,0.85); padding: 40px; border-radius: 15px;
      width: 400px; text-align: center;
    }
    h1 { color: #ffdd00; margin-bottom: 5px; }
    input {
      width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px;
      border: none; background: #222; color: white; font-size: 16px;
    }
    button {
      width: 100%; padding: 15px; margin: 15px 0; border: none;
      border-radius: 8px; background: #ff4444; color: white;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
    button:hover { background: #ff6666; }
    .toggle { color: #00ccff; cursor: pointer; margin-top: 10px; }
    .error { color: #ff6666; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚔 Polícia e Ladrão</h1>
    <h2 id="formTitle">Entrar na Conta</h2>

    <input type="text" id="username" placeholder="Nome de usuário">
    <input type="email" id="email" placeholder="Email (apenas no cadastro)">
    <input type="password" id="password" placeholder="Senha">

    <button id="submitBtn">Entrar</button>
    <p class="toggle" id="toggleText">Não tem conta? Cadastre-se</p>
    <p class="error" id="errorMsg"></p>
  </div>

  <script>
    let isLogin = true;
    const toggleText = document.getElementById('toggleText');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('email');
    const errorMsg = document.getElementById('errorMsg');

    toggleText.addEventListener('click', () => {
      isLogin = !isLogin;
      formTitle.textContent = isLogin ? "Entrar na Conta" : "Criar Conta";
      submitBtn.textContent = isLogin ? "Entrar" : "Cadastrar";
      toggleText.textContent = isLogin ? 
        "Não tem conta? Cadastre-se" : "Já tem conta? Entrar";
      
      emailInput.style.display = isLogin ? "none" : "block";
    });

    submitBtn.addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorMsg.textContent = '';

      if (!username || !password) {
        return errorMsg.textContent = "Preencha usuário e senha";
      }
      if (!isLogin && !email) {
        return errorMsg.textContent = "Email é obrigatório no cadastro";
      }

      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
      const body = isLogin ? { username, password } : { username, email, password };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', username);
          window.location.href = '/lobby.html';
        } else {
          errorMsg.textContent = data.message || "Erro ao processar";
        }
      } catch (err) {
        errorMsg.textContent = "Erro de conexão com o servidor";
      }
    });
  </script>
</body>
</html>
